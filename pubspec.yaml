name: opengraph
description: A comprehensive Flutter package for OpenGraph integration with dual functionality - extract metadata from URLs (opengraph_fetch) and display beautiful link previews (OpengraphPreview widget). Supports OpenGraph, Twitter Cards, HTML meta tags, and JSON-LD formats.
version: 1.1.0
homepage: https://datogedon.com
license: MIT
repository: https://github.com/baldomerocho/flutter_opengraph
issue_tracker: https://github.com/baldomerocho/flutter_opengraph/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  html: ^0.15.4
  http: ^1.1.0
  string_validator: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  mockito: ^5.4.2
  build_runner: ^2.4.9

flutter:
  assets:
    - assets/notfound.jpeg

