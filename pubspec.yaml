name: opengraph
description: Fetch and parse OpenGraph, Twitter Card, HTML meta and JSON-LD metadata from any URL, with a customizable cached link preview widget.
version: 1.2.0
homepage: https://datogedon.com
repository: https://github.com/baldomerocho/flutter_opengraph
issue_tracker: https://github.com/baldomerocho/flutter_opengraph/issues
topics:
  - opengraph
  - link-preview
  - metadata
  - twitter-card
  - widget
screenshots:
  - description: OpengraphPreview widget rendering link previews fetched from URLs
    path: ss/preview.png

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  html: ^0.15.4
  http: ^1.1.0
  string_validator: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  mockito: ^5.4.2
  build_runner: ^2.4.9

flutter:
  assets:
    - assets/notfound.jpeg

